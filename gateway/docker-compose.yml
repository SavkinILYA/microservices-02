version: '3.8'

services:

  # API Gateway
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - security
      - uploader
      - minio
    networks:
      - internal

  # Сервис аутентификации
  security:
    image: ghcr.io/netology-code/devkub-homeworks/security:latest
    expose:
      - "3000"
    networks:
      - internal

  # Сервис загрузки файлов
  uploader:
    image: ghcr.io/netology-code/devkub-homeworks/uploader:latest
    expose:
      - "3000"
    environment:
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=images
    depends_on:
      - minio
    networks:
      - internal

  # Объектное хранилище
  minio:
    image: minio/minio:latest
    command: server /data
    expose:
      - "9000"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - internal

  # Создаём бакет images при старте
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/images;
      mc anonymous set download local/images;
      exit 0;
      "
    networks:
      - internal

volumes:
  minio-data:

networks:
  internal:
    driver: bridge
